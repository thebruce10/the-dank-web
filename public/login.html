<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The Dank Web</title>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="icon" href="/images/site/favicon.ico">
</head>
<body>
    <div id="menuBar"></div>

    <div class="centerPanel">
        <h1>Login</h1>
        
        <form method="post" action="/login" id="loginForm"></form>
        
        <label>Username</label>
        <input name="username" form="loginForm" maxlength="64" placeholder="Enter username...">
        
        <label>Password</label>
        <input name="password" form="loginForm" type="password" placeholder="Enter password...">
    
        <button type="submit" form="loginForm">Login</button>

        <span>or</span>
        <a href="/register.html">Register</a>
    
    </div>


</body>
</html>
