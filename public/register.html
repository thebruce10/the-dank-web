<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - The Dank Web</title>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="icon" href="/images/site/favicon.ico">
</head>
<body>
    <div id="menuBar"></div>

    <div class="centerPanel">
        <h1>Register</h1>
        
        <form method="post" action="/register" id="registerForm"></form>
        
        <label>Username</label>
        <input name="username" id="username" form="registerForm" maxlength="64" placeholder="Enter username...">
        
        <label>Email</label>
        <input name="email" id="email" form="registerForm" maxlength="320" placeholder="Enter email...">
        
        <label>Password</label>
        <input name="password" id="password" form="registerForm" type="password" placeholder="Enter password...">
        
        <label>Confirm Password</label>
        <input name="passwordConfirm" id="passwordConfirm" form="registerForm" type="password" placeholder="Confirm password...">
        
        <div class="privacyPolicyCheckContainer" class="spaceAbove10">
            <input type="checkbox" class="checkbox" id="privacyPolicyCheck">
            <span>I agree to the <a href="/files/privacy-policy.pdf" target="_blank">privacy policy</a></span>
        </div>
    
        <button type="submit" id="registerButton" form="registerForm" disabled>Register</button>
    
    
    </div>


    <script src="register.js"></script>
</body>
</html>
